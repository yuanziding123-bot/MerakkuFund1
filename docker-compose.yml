name: aihf

services:
  aihf-web:
    build: .
    image: aihf-web:latest
    container_name: aihf-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POLYAGENTS_WEB_HOST: 0.0.0.0
      POLYAGENTS_WEB_PORT: 8000
      HOME: /data
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - aihf-data:/data
    labels:
      traefik.enable: "true"
      traefik.http.routers.aihf-web.rule: Host(`aihf.agentlab.studio`) || Host(`54.86.75.151`)
      traefik.http.routers.aihf-web.entrypoints: web
      traefik.http.services.aihf-web.loadbalancer.server.port: "8000"
    networks:
      - default
      - agentlab-public
    depends_on:
      aihf-postgres:
        condition: service_healthy

  aihf-postgres:
    image: pgvector/pgvector:pg16
    container_name: aihf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aihf
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: aihf
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - aihf-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aihf -d aihf"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - default

volumes:
  aihf-data:
  aihf-pgdata:

networks:
  agentlab-public:
    external: true
